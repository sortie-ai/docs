site_name: Sortie
site_url: https://docs.sortie-ai.com/
site_description: >-
  Autonomous coding agent orchestrator.
  Turns issue tracker tickets into agent sessions.
site_author: Sortie AI

repo_url: https://github.com/sortie-ai/sortie
repo_name: sortie-ai/sortie
edit_uri: ""

theme:
  name: shadcn
  show_title: true
  show_stargazers: true
  topbar_sections: true
  show_datetime: true
  pygments_style:
    light: shadcn-light
    dark: github-dark

markdown_extensions:
  - codehilite
  - fenced_code
  - admonition
  - attr_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details

plugins:
  - search

nav:
  - Home: index.md
  - Getting Started:
      # - Installation: getting-started/installation.md
      - Quick Start: getting-started/quick-start.md
      # - Jira Integration: getting-started/jira-integration.md
      # - End-to-End: getting-started/end-to-end.md
  - Reference:
      - CLI Usage: reference/cli.md
      - Workflow File: reference/workflow-config.md
  # - Architecture:
  #     - Decisions: decisions/decisions.md
  # - Contributing: contributing.md
  - Change Log: changelog.md

extra_css:
  - https://cdn.jsdelivr.net/gh/orestbida/cookieconsent@3.1.0/dist/cookieconsent.css

extra_javascript:
  - https://www.googletagmanager.com/gtag/js?id=G-58VR448EJK
  - https://cdn.jsdelivr.net/gh/orestbida/cookieconsent@3.1.0/dist/cookieconsent.umd.js
  - javascripts/cookieconsent-config.js
  - javascripts/feedback.js

