site_name: Sortie
site_url: https://docs.sortie-ai.com/
site_description: >-
  Autonomous coding agent orchestrator.
  Turns issue tracker tickets into agent sessions.
site_author: Sortie AI

repo_url: https://github.com/sortie-ai/sortie
repo_name: sortie-ai/sortie
edit_uri: ""

theme:
  name: shadcn
  custom_dir: overrides
  show_title: true
  show_stargazers: true
  topbar_sections: true
  show_datetime: true
  pygments_style:
    light: shadcn-light
    dark: github-dark
  katex_options:
    delimiters:
      - left: "\\["
        right: "\\]"
        display: true
      - left: "\\("
        right: "\\)"
        display: false

markdown_extensions:
  - pymdownx.highlight:
      css_class: codehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - attr_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true

hooks:
  - hooks/sitemap_dates.py

nav:
  - Sortie: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quick-start.md
      - Jira Integration: getting-started/jira-integration.md
      - End-to-End: getting-started/end-to-end.md
  - Guides:
      # Setup & Configuration
      - Connect to Jira: guides/connect-to-jira.md
      - Use File Adapter for Testing: guides/use-file-adapter-for-testing.md
      - Write a Prompt Template: guides/write-prompt-template.md
      - Set Up Workspace Hooks: guides/setup-workspace-hooks.md
      - Run Multiple Workflows: guides/run-multiple-workflows.md
      - Configure Retry Behavior: guides/configure-retry-behavior.md
      # Operations
      - Control Agent Costs: guides/control-costs.md
      - Run as a Systemd Service: guides/run-as-systemd-service.md
      - Scale Agents with SSH: guides/scale-agents-with-ssh.md
      - Monitor with Logs: guides/monitor-with-logs.md
      - Monitor with Prometheus: guides/monitor-with-prometheus.md
      # Advanced
      - Use Sub-Agents with Sortie: guides/use-subagents-with-sortie.md
      - Troubleshoot Common Failures: guides/troubleshoot-common-failures.md
  - Concepts:
      - Architecture: concepts/architecture.md
      - Orchestration: concepts/orchestration.md
      - Security Model: concepts/security.md
  - Reference:
      - CLI Usage: reference/cli.md
      - Workflow File: reference/workflow-config.md
      - Environment Variables: reference/environment.md
      - HTTP API: reference/http-api.md
      - Dashboard: reference/dashboard.md
      - Prometheus Metrics: reference/prometheus-metrics.md
      - Agent Extensions: reference/agent-extensions.md
      - Jira Adapter: reference/adapter-jira.md
      - Claude Code Adapter: reference/adapter-claude-code.md
      - State Machine: reference/state-machine.md
      - Errors: reference/errors.md
  - Changelog: changelog.md

extra_css:
  - stylesheets/cookieconsent.css
  - stylesheets/custom.css

extra_javascript:
  - path: https://www.googletagmanager.com/gtag/js?id=G-58VR448EJK
    async: true
  - https://cdn.jsdelivr.net/gh/orestbida/cookieconsent@3.1.0/dist/cookieconsent.umd.js
  - javascripts/cookieconsent-config.js
  - javascripts/feedback.js
  - https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js
  - javascripts/mermaid-init.js
