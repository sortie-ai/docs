site_name: Sortie
site_url: https://docs.sortie-ai.com/
site_description: >-
  Autonomous coding agent orchestrator.
  Turns issue tracker tickets into agent sessions.
site_author: Sortie AI

repo_url: https://github.com/sortie-ai/sortie
repo_name: sortie-ai/sortie
edit_uri: ""

theme:
  name: shadcn
  custom_dir: overrides
  show_title: true
  show_stargazers: true
  topbar_sections: true
  show_datetime: true
  pygments_style:
    light: shadcn-light
    dark: github-dark
  katex_options:
    delimiters:
      - left: "\\["
        right: "\\]"
        display: true
      - left: "\\("
        right: "\\)"
        display: false

markdown_extensions:
  - pymdownx.highlight:
      css_class: codehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - attr_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true

hooks:
  - hooks/sitemap_dates.py

nav:
  - Sortie: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quick-start.md
      - Jira Integration: getting-started/jira-integration.md
      - GitHub Integration: getting-started/github-integration.md
      - End-to-End: getting-started/end-to-end.md
      # M13: Copilot CLI adapter
      #- GitHub + Copilot End-to-End: getting-started/github-copilot-end-to-end.md
  - Guides:
      # Setup & Configuration
      - Connect to Jira: guides/connect-to-jira.md
      - Connect to GitHub: guides/connect-to-github.md
      - Use File Adapter for Testing: guides/use-file-adapter-for-testing.md
      - Write a Prompt Template: guides/write-prompt-template.md
      - Set Up Workspace Hooks: guides/setup-workspace-hooks.md
      - Integrate Security Scanning: guides/integrate-security-scanning.md
      - Run Multiple Workflows: guides/run-multiple-workflows.md
      - Configure Retry Behavior: guides/configure-retry-behavior.md
      # Operations
      - Resume Sessions Across Restarts: guides/resume-sessions-across-restarts.md
      - Control Agent Costs: guides/control-costs.md
      - Run as a Systemd Service: guides/run-as-systemd-service.md
      - Run as a Launchctl Service: guides/run-as-launchctl-service.md
      # M16: CI feedback loop
      #- Set Up CI Feedback Loop: guides/setup-ci-feedback-loop.md
      - Scale Agents with SSH: guides/scale-agents-with-ssh.md
      - Monitor with Logs: guides/monitor-with-logs.md
      - Monitor with Prometheus: guides/monitor-with-prometheus.md
      # Advanced
      # Deployment
      # M17: Docker, Helm, GitHub Action
      #- Deploy with Docker: guides/deploy-with-docker.md
      #- Deploy to Kubernetes: guides/deploy-to-kubernetes.md
      #- Run with GitHub Actions: guides/run-with-github-actions.md
      # Advanced
      # M14: Agent tools
      #- Use Agent Tools in Prompts: guides/use-agent-tools-in-prompts.md
      #- Write a Custom Agent Tool: guides/write-custom-agent-tool.md
      - Use Sub-Agents with Sortie: guides/use-subagents-with-sortie.md
      # M19: GitHub deep integration
      #- Set Up PR Reactions: guides/setup-pr-reactions.md
      - Troubleshoot Common Failures: guides/troubleshoot-common-failures.md
      # Post-milestone: extensibility
      #- Write a Custom Tracker Adapter: guides/write-custom-tracker-adapter.md
      #- Write a Custom Agent Adapter: guides/write-custom-agent-adapter.md
      # Post-milestone: testing
      #- Run Integration Tests: guides/run-integration-tests.md
  - Concepts:
      - Architecture: concepts/architecture.md
      - Adapter Model: concepts/adapter-model.md
      - Persistence: concepts/persistence.md
      - Orchestration: concepts/orchestration.md
      - Security Model: concepts/security.md
  - Reference:
      - CLI Usage: reference/cli.md
      - Workflow File: reference/workflow-config.md
      - Environment Variables: reference/environment.md
      - HTTP API: reference/http-api.md
      - Dashboard: reference/dashboard.md
      - Prometheus Metrics: reference/prometheus-metrics.md
      - Agent Extensions: reference/agent-extensions.md
      # Tracker adapters
      - Jira Adapter: reference/adapter-jira.md
      - GitHub Adapter: reference/adapter-github.md
      # M18: ecosystem adapters
      #- Linear Adapter: reference/adapter-linear.md
      # Agent adapters
      - Claude Code Adapter: reference/adapter-claude-code.md
      # M13: Copilot CLI adapter
      #- Copilot CLI Adapter: reference/adapter-copilot.md
      # M18: ecosystem adapters
      #- Codex CLI Adapter: reference/adapter-codex.md
      #- Gemini CLI Adapter: reference/adapter-gemini.md
      # Core
      - State Machine: reference/state-machine.md
      - Errors: reference/errors.md
  - Changelog: changelog.md

extra_css:
  - stylesheets/cookieconsent.css
  - stylesheets/custom.css

extra_javascript:
  - path: https://www.googletagmanager.com/gtag/js?id=G-58VR448EJK
    async: true
  - https://cdn.jsdelivr.net/gh/orestbida/cookieconsent@3.1.0/dist/cookieconsent.umd.js
  - javascripts/cookieconsent-config.js
  - javascripts/feedback.js
  - https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js
  - javascripts/mermaid-init.js
