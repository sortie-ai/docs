site_name: Sortie
site_url: https://docs.sortie-ai.com/
site_description: >-
  Autonomous coding agent orchestrator.
  Turns issue tracker tickets into agent sessions.
site_author: Sortie AI

repo_url: https://github.com/sortie-ai/sortie
repo_name: sortie-ai/sortie
edit_uri: ""

theme:
  name: shadcn
  custom_dir: overrides
  show_title: true
  show_stargazers: true
  topbar_sections: true
  show_datetime: true
  pygments_style:
    light: shadcn-light
    dark: github-dark
  katex_options:
    delimiters:
      - left: "\\["
        right: "\\]"
        display: true
      - left: "\\("
        right: "\\)"
        display: false

markdown_extensions:
  - pymdownx.highlight:
      css_class: codehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - attr_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true

hooks:
  - hooks/sitemap_dates.py

nav:
  - Sortie: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quick-start.md
  - Guides:
      - Scale Agents with SSH: guides/scale-agents-with-ssh.md
      - Monitor with Logs: guides/monitor-with-logs.md
      - Monitor with Prometheus: guides/monitor-with-prometheus.md
  - Reference:
      - CLI Usage: reference/cli.md
      - Workflow File: reference/workflow-config.md
      - Environment Variables: reference/environment.md
      - HTTP API: reference/http-api.md
      - Dashboard: reference/dashboard.md
      - Prometheus Metrics: reference/prometheus-metrics.md
      - Agent Extensions: reference/agent-extensions.md
      - Errors: reference/errors.md
  - Change Log: changelog.md

extra_css:
  - stylesheets/cookieconsent.css
  - stylesheets/custom.css

extra_javascript:
  - path: https://www.googletagmanager.com/gtag/js?id=G-58VR448EJK
    async: true
  - https://cdn.jsdelivr.net/gh/orestbida/cookieconsent@3.1.0/dist/cookieconsent.umd.js
  - javascripts/cookieconsent-config.js
  - javascripts/feedback.js
  - https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js
  - javascripts/mermaid-init.js
