baseURL = "https://docs.sortie-ai.com/"
title = "Sortie"
locale = "en-US"
defaultContentLanguage = "en"
# Hugo outputs public/ which becomes the Cloudflare Pages deploy directory.
publishDir = "public"

# enableGitInfo replaces git-revision-date-localized MkDocs plugin.
# Requires the build environment to have full Git history (not a shallow clone).
enableGitInfo = true

# Enable inline HTML in Markdown (needed for existing content with raw HTML).
[markup]
[markup.goldmark]
[markup.goldmark.renderer]
unsafe = true
[markup.goldmark.extensions]
[markup.goldmark.extensions.passthrough]
enable = true
[markup.goldmark.extensions.passthrough.delimiters]
block = [['\[', '\]'], ['$$', '$$']]
inline = [['\(', '\)']]
[markup.highlight]
noClasses = false
lineNos = false
style = "github"

# Summaries for section index pages.
summaryLength = 70

# Front matter date resolution order.
# .Date / .PublishDate → from 'date' front matter (git creation date, populated during migration).
# .Lastmod → from git author date of last commit, fallback to 'lastmod' front matter.
[frontmatter]
date = ['date', ':default']
lastmod = [':git', 'lastmod', ':default']
publishDate = ['date', ':default']

[params]
description = "Autonomous coding agent orchestrator. Turns issue tracker tickets into agent sessions."

# Version announcement banner. Set to false to disable entirely.
# message: custom text; leave empty to use the default "Sortie vX.Y.Z is here!" message.
[params.banner]
message = ""

# Global KaTeX support (replaces pymdownx.arithmatex).
# params.math must be a table, not a bool — Hextra accesses params.math.engine.
[params.math]
engine = "katex"

# Hextra display settings.
[params.theme]
default = "system"
displayToggle = true

# Repository link for "Edit this page on GitHub" in the TOC sidebar.
[params.editURL]
enable = true
base = "https://github.com/sortie-ai/docs/edit/main/content"

# Navbar logo configuration.
[params.navbar]
displayTitle = true
displayLogo = true
[params.navbar.logo]
path = "img/logo-dark.png"
dark = "img/logo-light.png"
width = 20
height = 20
link = "/"

# Sidebar configuration.
[params.sidebar]
hide = false

# Footer.
[params.footer]
enable = true
displayCopyright = true
displayPoweredBy = false

# Search (Hextra's built-in FlexSearch).
[params.search]
enable = true
type = "flexsearch"

# Page width.
[params.page]
width = "normal"

[menu]
[[menu.main]]
name = "Search"
weight = 10
[menu.main.params]
type = "search"

[module]
[[module.imports]]
path = "github.com/imfing/hextra"

# --------------------------------------------------------------------------
# llms.txt support — https://llmstxt.org/
# Generates /llms.txt (navigation index) and /llms-full.txt (full content)
# at build time, plus /path/to/page/index.md for every regular page.
# --------------------------------------------------------------------------

[mediaTypes."text/markdown"]
suffixes = ["md"]

# llms.txt — navigation index with links to .md versions of each page.
[outputFormats.LLMsTxt]
mediaType = "text/plain"
baseName = "llms"
isPlainText = true
notAlternative = true
rel = "alternate"

# llms-full.txt — entire documentation concatenated as Markdown.
# NOTE: "LLMsFull" lowercases to "llmsfull" which matches the template
# filename layouts/index.llmsfull.txt so that isPlainText=true applies.
[outputFormats.LLMsFull]
mediaType = "text/plain"
baseName = "llms-full"
isPlainText = true
notAlternative = true
rel = "alternate"

# Markdown — serves the raw Markdown source of each page at index.md.
[outputFormats.Markdown]
mediaType = "text/markdown"
baseName = "index"
isPlainText = true
notAlternative = true
rel = "alternate"

[outputs]
# Home page generates HTML + both LLM text files.
home = ["HTML", "RSS", "LLMsTxt", "LLMsFull"]
# Regular pages generate HTML + a raw Markdown mirror at index.md.
page = ["HTML", "Markdown"]
# Sections generate HTML only (index pages mostly contain shortcodes).
section = ["HTML"]
