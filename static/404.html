<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Page Not Found | Sortie</title>
    <meta name="robots" content="noindex" />
    <style>
      :root {
        --bg: #ffffff;
        --fg: #09090b;
        --muted: #71717a;
        --border: #e4e4e7;
        --link: #18181b;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #09090b;
          --fg: #fafafa;
          --muted: #a1a1aa;
          --border: #27272a;
          --link: #fafafa;
        }
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          "Geist",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
        background: var(--bg);
        color: var(--fg);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 2rem;
      }
      .container {
        max-width: 28rem;
        text-align: center;
      }
      h1 {
        font-size: 3rem;
        font-weight: 700;
        letter-spacing: -0.025em;
      }
      p {
        color: var(--muted);
        margin-top: 0.75rem;
        font-size: 1.05rem;
      }
      .links {
        margin-top: 2rem;
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        justify-content: center;
      }
      a {
        color: var(--link);
        text-decoration: none;
        border: 1px solid var(--border);
        border-radius: 0.375rem;
        padding: 0.5rem 1rem;
        font-size: 0.875rem;
        font-weight: 500;
        transition: background 0.15s;
      }
      a:hover {
        background: var(--border);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>404</h1>
      <p>The page you're looking for doesn't exist or has been moved.</p>
      <div class="links">
        <a href="/">Home</a>
        <a href="/getting-started/quick-start/">Quick Start</a>
        <a href="/reference/cli/">CLI Reference</a>
        <a href="/reference/workflow-config/">Workflow Config</a>
      </div>
    </div>
  </body>
</html>
